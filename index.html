<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTProto Gold Monitor</title>
    <style>
        :root {
            --apple-blue: #0A84FF;
            --apple-green: #30D158;
            --apple-yellow: #FFD60A;
            --apple-red: #FF453A;
            --card-gray: #1C1C1E; 
            --bg-black: #000000;  
            --text-gray: #8E8E93;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-black);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 600px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 80px; }

        header {
            padding: 16px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 0.5px solid #2C2C2E;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 6px;
        }

        .header-note {
            width: 100%;
            font-size: 12px;
            color: var(--apple-yellow);
            font-weight: 700;
            letter-spacing: -0.1px;
        }

        .nav-right { display: flex; gap: 8px; align-items: center; }

        .tooltip-container { position: relative; display: inline-flex; }
        .tooltip-text {
            visibility: hidden; background-color: #3A3A3C; color: #fff;
            text-align: center; border-radius: 8px; padding: 6px 10px;
            position: absolute; z-index: 200; opacity: 0;
            transition: 0.2s; font-size: 11px; font-weight: 600;
            white-space: nowrap; pointer-events: none;
            bottom: 125%; left: 50%; transform: translateX(-50%) translateY(5px);
        }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }

        #loadingNote {
            display: none; background: #1C1C1E; padding: 10px 16px;
            border-bottom: 0.5px solid #2C2C2E; font-size: 12px;
            color: var(--text-gray); text-align: center;
        }

        .list { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: var(--card-gray); border-radius: 20px; padding: 14px;
            display: flex; justify-content: space-between; align-items: center;
            border: 0.5px solid #38383A;
        }
        .info { flex: 1; min-width: 0; margin-right: 8px; }
        .server-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .server-name span { text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .server-meta { font-size: 12px; color: var(--text-gray); display: flex; align-items: center; gap: 6px; }
        .ping-val { font-weight: 800; font-size: 10px; padding: 2px 6px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .fast { color: var(--apple-green); }
        .slow { color: var(--apple-yellow); }
        .dead { color: var(--apple-red); }

        .actions { display: flex; gap: 6px; }
        .icon-btn { 
            width: 36px; height: 36px; border-radius: 10px; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .header-icon {
            background: rgba(255,255,255,0.08); border-radius: 50%; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; border: none; text-decoration: none;
        }
        
        .btn-fav { background: #2C2C2E; color: #8E8E93; border: 0.5px solid #38383A; }
        .btn-fav.active { color: var(--apple-yellow); }
        .btn-copy { background: #2C2C2E; color: #fff; border: 0.5px solid #38383A; }
        .btn-set { background: var(--apple-blue); color: #fff; }

        .section-label { color: var(--text-gray); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 20px 16px 0px 16px; }
        #progress-line { height: 2px; background: var(--apple-blue); width: 0%; position: fixed; top: 68px; z-index: 101; transition: width 0.2s; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating { animation: rotate 1s linear infinite; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-content { 
            background: #1C1C1E; width: 85%; max-width: 380px; padding: 25px; 
            border-radius: 28px; border: 0.5px solid #38383A; text-align: center;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-disclaimer {
            margin-top: 14px;
            padding: 10px 12px;
            background: #2C2C2E;
            color: var(--text-gray);
            border: 0.5px solid #38383A;
            border-radius: 14px;
            font-size: 12px;
            line-height: 1.5;
            text-align: left;
        }
        .disclaimer-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
            gap: 8px;
        }
        .btn-ghost {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 0.5px solid #38383A;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .modal-btn-main { background: var(--apple-blue); color: #fff; text-decoration: none; padding: 14px; border-radius: 14px; display: block; font-weight: 700; margin-top: 20px; font-size: 16px; border: none; cursor: pointer; }
        .modal-link-sub { color: var(--apple-blue); text-decoration: none; display: inline-block; margin-top: 15px; font-size: 13px; font-weight: 500; }

        .qr-image { width: 180px; height: 180px; margin: 15px auto; border-radius: 18px; border: 0.5px solid #38383A; display: block; }
        .donate-item { margin-top: 20px; text-align: left; }
        .wallet-label { font-size: 12px; color: #fff; font-weight: 700; margin-bottom: 6px; display: block; }
        .wallet-address { background: #2C2C2E; padding: 12px; border-radius: 12px; font-family: monospace; font-size: 11px; word-break: break-all; color: var(--apple-blue); cursor: pointer; border: 0.5px solid #38383A; transition: 0.2s; }
        .wallet-address:active { background: #3A3A3C; }
        .network-warning { font-size: 11px; color: var(--apple-red); line-height: 1.4; margin-top: 8px; font-weight: 500; }
    </style>
</head>
<body>

<div id="progress-line"></div>

<div class="container">
    <header>
        <div>
            <h1 style="font-size: 18px; margin: 0; letter-spacing: -0.5px;">MTProto Gold</h1>
            <div style="color: var(--text-gray); font-size: 11px; margin-top: 2px;">Backend API Monitor 2026</div>
        </div>
        <div class="nav-right">
            <a class="header-icon" href="https://t.me/proxy_public0" target="_blank" title="Канал Telegram" aria-label="Telegram channel">
                <svg width="20" height="20" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="240" height="240" rx="48" fill="#29A9E8"/>
                    <path d="M56.8 117.4c-10.1-3.5-10-8.3.2-11.8l111.6-37.8c9.9-3.4 15.5 2 12.3 15.4l-19 88.1c-2.6 11.5-9 14.3-18.3 9l-29.7-21.9-14.3 13.9c-1.6 1.6-3 3-6.2 3l2.2-32.1 58.4-52.7c2.5-2.2-.6-3.5-3.9-1.3l-72.2 45.5-31.2-10.3Z" fill="white"/>
                </svg>
            </a>
            <button class="header-icon" style="background: var(--apple-yellow); color: #000;" onclick="openModal('donateModal')" title="Поддержать проект">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-8-4.35-8-11a8 8 0 0 1 16 0c0 6.65-8 11-8 11Z"></path><path d="M12 11a2 2 0 1 0-2-2"></path></svg>
            </button>
            <button class="header-icon" onclick="openModal('historyModal')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </button>
            <button class="header-icon" id="refreshBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
            </button>
        </div>
        <div class="header-note">Обновление серверов через API...</div>
    </header>

    <div id="loadingNote">Загрузка данных с бэкенда Render. Пожалуйста, подождите.</div>

    <div id="favoriteSection" style="display:none;">
        <div class="section-label" style="color:var(--apple-yellow)">⭐ Избранное</div>
        <div id="favoriteList" class="list"></div>
    </div>

    <div class="section-label">Доступные сервера</div>
    <div id="mainList" class="list"></div>
</div>

<div id="donateModal" class="modal">...</div> 
<div id="connectModal" class="modal">...</div>
<div id="historyModal" class="modal">...</div>

<script>
    const ICON_PLANE = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M1.946 9.315c-.522.174-.527.455.01.634l2.887.969 1.921 5.43c.21.595.576.667.818.167l1.39-2.83 4.626 4.625c.415.415 1.091.146 1.091-.437V15.25l4.637-4.637 4.674 4.674c.415.415 1.091.146 1.091-.437V1.102c0-.584-.638-.897-1.091-.438L1.946 9.315Z"></path></svg>`;
    const ICON_COPY = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
    const ICON_STAR = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>`;

    const RAW_DATA_URL = "https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt";
    const API_URL = "https://mtproto-ping.onrender.com/ping"; // Твой бэкенд на Render

    let proxies = [];
    let favorites = JSON.parse(localStorage.getItem('userFavs') || '[]');
    let history = JSON.parse(localStorage.getItem('proxyHistory') || '[]');
    let currentConnectLink = '';

    function getFlag(host) {
        const h = host.toLowerCase();
        if (h.endsWith('.ir')) return '🇮🇷';
        if (h.endsWith('.ru')) return '🇷🇺';
        if (h.endsWith('.nl')) return '🇳🇱';
        if (h.endsWith('.de')) return '🇩🇪';
        return '🌐';
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

   async function load() {
    const btn = document.querySelector('.btn-refresh');
    if (btn) btn.classList.add('loading');

    try {
        // 1. Получаем список прокси из твоего внешнего источника
        const response = await fetch(RAW_DATA_URL);
        const text = await response.text();
        const parsed = parseProxies(text);

        // 2. Отправляем их на твой Render-бэкенд для пинга
        const pingRes = await fetch("https://mtproto-ping.onrender.com/ping", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ proxies: parsed })
        });

        if (!pingRes.ok) throw new Error("Ошибка бэкенда");

        // 3. Получаем результат и обновляем интерфейс
        proxies = await pingRes.json();
        render();

    } catch (e) {
        console.error("Ошибка:", e);
        alert("Не удалось обновить список серверов");
    } finally {
        if (btn) btn.classList.remove('loading');
    }
}

    function cardHtml(p) {
        const isFav = favorites.some(f => f.full === p.full);
        const flag = getFlag(p.host);
        let dot = '⚪'; let pClass = ''; let pText = p.alive ? p.ping + ' ms' : 'offline';

        if (p.alive) {
            if (p.ping < 450) { dot = '🟢'; pClass = 'fast'; }
            else { dot = '🟡'; pClass = 'slow'; }
        } else {
            dot = '🔴'; pClass = 'dead';
        }

        const pJson = JSON.stringify(p).replace(/"/g, '&quot;');

        return `
            <div class="card" style="${!p.alive ? 'opacity: 0.5' : ''}">
                <div class="info">
                    <div class="server-name">${dot} ${flag} <span>${p.host}</span></div>
                    <div class="server-meta">
                        <span class="ping-val ${pClass}">${pText}</span>
                        <span>• ${p.port}</span>
                    </div>
                </div>
                <div class="actions">
                    <button class="icon-btn btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav('${p.full}')">${ICON_STAR}</button>
                    <div class="tooltip-container">
                        <button class="icon-btn btn-copy" onclick="copyAddr('${p.full}', this, ${pJson})">${ICON_COPY}</button>
                        <span class="tooltip-text">Копировать</span>
                    </div>
                    <button class="icon-btn btn-set" onclick="prepareConnect('${p.full}', ${pJson})" ${!p.alive ? 'disabled' : ''}>${ICON_PLANE}</button>
                </div>
            </div>`;
    }

    function render() {
        const favBox = document.getElementById('favoriteSection');
        if (favorites.length) {
            favBox.style.display = 'block';
            document.getElementById('favoriteList').innerHTML = favorites.map(p => cardHtml(p)).join('');
        } else favBox.style.display = 'none';

        // Сортировка: сначала живые по пингу, потом мертвые
        const sorted = [...proxies].sort((a, b) => {
            if (a.alive !== b.alive) return b.alive - a.alive;
            return (a.ping || 9999) - (b.ping || 9999);
        });

        document.getElementById('mainList').innerHTML = sorted.map(p => cardHtml(p)).join('');
        document.getElementById('historyList').innerHTML = history.map(p => cardHtml(p)).join('') || 'Пусто';
    }

    // Вспомогательные функции (prepareConnect, toggleFav, и т.д.) остаются прежними
    function prepareConnect(url, obj) {
        history = [obj, ...history.filter(h => h.full !== obj.full)].slice(0, 5);
        localStorage.setItem('proxyHistory', JSON.stringify(history));
        currentConnectLink = url;
        document.getElementById('finalConnectBtn').href = url.replace('tg://','https://t.me/');
        openModal('connectModal');
    }

    function toggleFav(full) {
        const idx = favorites.findIndex(f => f.full === full);
        if (idx > -1) favorites.splice(idx, 1);
        else {
            const p = proxies.find(x => x.full === full);
            if (p) favorites.push({...p});
        }
        localStorage.setItem('userFavs', JSON.stringify(favorites));
        render();
    }

    function copyAddr(text, btn, obj) {
        navigator.clipboard.writeText(text);
        const tip = btn.parentElement.querySelector('.tooltip-text');
        if(tip) {
            tip.innerText = "Готово!";
            setTimeout(() => tip.innerText = "Копировать", 1500);
        }
    }

    window.onload = load;
    document.getElementById('refreshBtn').onclick = load;
</script>
</body>
</html>

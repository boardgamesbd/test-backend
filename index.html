<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTProto Gold Monitor</title>
    <style>
        :root {
            --apple-blue: #0A84FF;
            --apple-green: #30D158;
            --apple-yellow: #FFD60A;
            --apple-red: #FF453A;
            --card-gray: #1C1C1E; 
            --bg-black: #000000;  
            --text-gray: #8E8E93;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-black);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 600px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 80px; }

        header {
            padding: 16px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 0.5px solid #2C2C2E;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 6px;
        }

        .header-note {
            width: 100%;
            font-size: 12px;
            color: var(--apple-yellow);
            font-weight: 700;
            letter-spacing: -0.1px;
        }

        .nav-right { display: flex; gap: 8px; align-items: center; }

        .list { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: var(--card-gray); border-radius: 20px; padding: 14px;
            display: flex; justify-content: space-between; align-items: center;
            border: 0.5px solid #38383A;
            transition: 0.3s;
        }
        .info { flex: 1; min-width: 0; margin-right: 8px; }
        .server-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .server-name span { text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .server-meta { font-size: 12px; color: var(--text-gray); display: flex; align-items: center; gap: 6px; }
        .ping-val { font-weight: 800; font-size: 10px; padding: 2px 6px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .fast { color: var(--apple-green); }
        .slow { color: var(--apple-yellow); }
        .dead { color: var(--apple-red); }

        .actions { display: flex; gap: 6px; }
        .icon-btn { 
            width: 36px; height: 36px; border-radius: 10px; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .header-icon {
            background: rgba(255,255,255,0.08); border-radius: 50%; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; border: none;
        }
        
        .btn-fav { background: #2C2C2E; color: #8E8E93; border: 0.5px solid #38383A; }
        .btn-fav.active { color: var(--apple-yellow); }
        .btn-copy { background: #2C2C2E; color: #fff; border: 0.5px solid #38383A; }
        .btn-set { background: var(--apple-blue); color: #fff; }
        .btn-set:disabled { background: #2C2C2E; color: #444; cursor: not-allowed; opacity: 0.5; }

        .section-label { color: var(--text-gray); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 20px 16px 0px 16px; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating { animation: rotate 1s linear infinite; }

        .tooltip-container { position: relative; }
        .tooltip-text {
            visibility: hidden; background: #3A3A3C; color: #fff; font-size: 10px;
            padding: 4px 8px; border-radius: 6px; position: absolute; bottom: 120%;
            left: 50%; transform: translateX(-50%); white-space: nowrap; opacity: 0; transition: 0.2s;
        }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="font-size: 18px; margin: 0; letter-spacing: -0.5px;">MTProto Gold</h1>
            <div style="color: var(--text-gray); font-size: 11px; margin-top: 2px;">Backend API Monitor</div>
        </div>
        <div class="nav-right">
            <button class="header-icon" id="refreshBtn">
                <svg id="refreshSvg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
            </button>
        </div>
        <div id="statusNote" class="header-note">Готов к работе</div>
    </header>

    <div id="favoriteSection" style="display:none;">
        <div class="section-label" style="color:var(--apple-yellow)">⭐ Избранное</div>
        <div id="favoriteList" class="list"></div>
    </div>

    <div class="section-label">Доступные сервера</div>
    <div id="mainList" class="list"></div>
</div>

<script>
    const ICON_PLANE = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M1.946 9.315c-.522.174-.527.455.01.634l2.887.969 1.921 5.43c.21.595.576.667.818.167l1.39-2.83 4.626 4.625c.415.415 1.091.146 1.091-.437V15.25l4.637-4.637 4.674 4.674c.415.415 1.091.146 1.091-.437V1.102c0-.584-.638-.897-1.091-.438L1.946 9.315Z"></path></svg>`;
    const ICON_COPY = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
    const ICON_STAR = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>`;

    const API_URL = "https://mtproto-ping.onrender.com/ping";

    let proxies = [];
    let favorites = JSON.parse(localStorage.getItem('userFavs') || '[]');

    async function load() {
        const refreshIcon = document.getElementById('refreshSvg');
        const statusNote = document.getElementById('statusNote');
        
        if (refreshIcon.classList.contains('rotating')) return;

        // 1. Случайная задержка (Jitter) до 2 секунд для распределения нагрузки
        await new Promise(r => setTimeout(r, Math.random() * 2000));

        refreshIcon.classList.add('rotating');
        statusNote.innerText = "Получение данных...";

        try {
            // 2. Теперь мы просто запрашиваем данные у сервера (он сам кэширует список)
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error("Сервер занят");

            proxies = await response.json();

            // Сортировка и фильтрация уже сделана на бэкенде, но для верности:
            proxies.sort((a, b) => {
                if (a.alive !== b.alive) return b.alive - a.alive;
                return (a.ping || 9999) - (b.ping || 9999);
            });

            statusNote.innerText = `Обновлено: ${new Date().toLocaleTimeString()} (Найдено: ${proxies.length})`;
            render();
        } catch (e) {
            statusNote.innerText = "Ошибка: Сервер обновляется, попробуйте через минуту";
            console.error(e);
        } finally {
            refreshIcon.classList.remove('rotating');
        }
    }

    function cardHtml(p) {
        const isFav = favorites.some(f => f.full === p.full);
        let dot = p.alive ? (p.ping < 500 ? '🟢' : '🟡') : '🔴';
        let pClass = p.alive ? (p.ping < 500 ? 'fast' : 'slow') : 'dead';
        let pText = p.alive ? p.ping + ' ms' : 'offline';

        return `
            <div class="card" style="${!p.alive ? 'opacity: 0.5' : ''}">
                <div class="info">
                    <div class="server-name">${dot} 🌐 <span>${p.host}</span></div>
                    <div class="server-meta">
                        <span class="ping-val ${pClass}">${pText}</span>
                        <span>• ${p.port}</span>
                    </div>
                </div>
                <div class="actions">
                    <button class="icon-btn btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav('${p.full}')">${ICON_STAR}</button>
                    <div class="tooltip-container">
                        <button class="icon-btn btn-copy" onclick="copyAddr('${p.full}', this)">${ICON_COPY}</button>
                        <span class="tooltip-text">Копировать</span>
                    </div>
                    <button class="icon-btn btn-set" onclick="connect('${p.full}')" ${!p.alive ? 'disabled' : ''}>${ICON_PLANE}</button>
                </div>
            </div>`;
    }

    function render() {
        const favBox = document.getElementById('favoriteSection');
        if (favorites.length) {
            favBox.style.display = 'block';
            // Обновляем пинги в избранном, если эти прокси есть в общем списке
            const updatedFavs = favorites.map(fav => {
                const live = proxies.find(p => p.full === fav.full);
                return live ? { ...fav, alive: live.alive, ping: live.ping } : fav;
            });
            document.getElementById('favoriteList').innerHTML = updatedFavs.map(p => cardHtml(p)).join('');
        } else favBox.style.display = 'none';

        document.getElementById('mainList').innerHTML = proxies.map(p => cardHtml(p)).join('');
    }

    function toggleFav(full) {
        const idx = favorites.findIndex(f => f.full === full);
        if (idx > -1) {
            favorites.splice(idx, 1);
        } else {
            const p = proxies.find(x => x.full === full);
            if (p) favorites.push({...p});
        }
        localStorage.setItem('userFavs', JSON.stringify(favorites));
        render();
    }

    function copyAddr(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const tip = btn.parentElement.querySelector('.tooltip-text');
            if(tip) {
                tip.innerText = "Скопировано!";
                tip.style.visibility = 'visible';
                tip.style.opacity = '1';
                setTimeout(() => {
                    tip.innerText = "Копировать";
                    tip.style.visibility = '';
                    tip.style.opacity = '';
                }, 1000);
            }
        });
    }

    function connect(url) {
        window.open(url.replace('tg://', 'https://t.me/'), '_blank');
    }

    window.onload = load;
    document.getElementById('refreshBtn').onclick = load;
</script>
</body>
</html>
